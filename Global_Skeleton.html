<!-- ExpCSS RECONSTRUCTION | Universal Skeleton v2.0 -->
<!-- Relational Meta: {{ relational_guid }} -->
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }} | {{ site_title }}</title>
    
    <!-- SEO & Meta Tags -->
    <meta name="description" content="{{ seo_description or site_tagline }}">
    <meta name="keywords" content="ExpCSS, MFDB, Vanilla JS, Dark Theme, {{ category_name or 'CMS' }}">
    <meta property="og:title" content="{{ page_title }} | {{ site_title }}">
    <meta property="og:description" content="{{ seo_description or site_tagline }}">
    <meta property="og:type" content="website">
    <meta property="og:image" content="{{ rel_prefix }}assets/{{ featured_img or 'og-default.png' }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Roboto:wght@300;400;500;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS Core & Components (Standard Library) -->
    <link rel="stylesheet" href="{{ rel_prefix }}css/becss-core.css">
    <link rel="stylesheet" href="{{ rel_prefix }}css/becss-components.css">
    <link rel="stylesheet" href="{{ rel_prefix }}css/becss-headers.css">
    <link rel="stylesheet" href="{{ rel_prefix }}css/becss-sidebars.css">
    <link rel="stylesheet" href="{{ rel_prefix }}css/becss-footers.css">
    
    <!-- Tailwind for Grid/Utility (ExpCSS Standard) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root { --primary: #fe3626; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex flex-col">

    <!-- BLOCK: HEADER -->
    <div id="header-container">
        {{ header_block | safe }}
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="container mx-auto px-4 py-8 flex-grow grid grid-cols-1 lg:grid-cols-4 gap-8">
        
        <!-- BLOCK: SIDEBAR (Left Column) -->
        <aside class="lg:col-span-1">
            {{ sidebar_block | safe }}
        </aside>

        <!-- BLOCK: MAIN CONTENT -->
        <main class="lg:col-span-3">
            {{ main_content | safe }}
            
            {% if related_content %}
            <section class="mt-12 pt-8 border-t border-gray-800">
                <h3 class="text-xl font-bold mb-6">More from {{ category_name }}</h3>
                {{ related_block | safe }}
            </section>
            {% endif %}
        </main>

    </div>

    <!-- BLOCK: FOOTER -->
    <footer id="footer-container">
        {{ footer_block | safe }}
    </footer>

    <script>
        // Universal Sidebar Controller
        document.addEventListener('DOMContentLoaded', () => {
            const menuBtn = document.querySelector('.hamburger');
            const mobileNav = document.querySelector('.mobile-sidebar') || document.querySelector('.c-sidebar');
            const overlay = document.getElementById('sidebarOverlay');

            if (menuBtn && mobileNav) {
                menuBtn.addEventListener('click', () => {
                    mobileNav.classList.toggle('open');
                    if (overlay) overlay.classList.toggle('open');
                });
            }
            
            lucide.createIcons();
        });
    </script>
</body>
</html>
