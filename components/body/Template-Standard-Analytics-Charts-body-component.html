<!-- Component Name: Template Standard - Analytics Dashboard | Type: Body Component | Version: 1.0.0 -->


<div class="c-analytics-charts" container-type="inline-size">
    <div class="chart-grid">
    <div class="chart-card">
        <div class="chart-header"><span class="chart-title">API Throughput</span></div>
        <div class="chart-viz">
            <div class="chart-bar" style="height: 40%;"></div>
            <div class="chart-bar" style="height: 60%;"></div>
            <div class="chart-bar" style="height: 35%;"></div>
            <div class="chart-bar" style="height: 90%;"></div>
            <div class="chart-bar" style="height: 55%;"></div>
            <div class="chart-bar" style="height: 70%;"></div>
            <div class="chart-bar" style="height: 80%;"></div>
        </div>
        <div class="chart-legend">
            <div class="legend-item"><span class="dot" style="background:#de2626;"></span> Requests/s</div>
        </div>
    </div>
    <div class="chart-card">
        <div class="chart-header"><span class="chart-title">Memory Allocation</span></div>
        <div style="height:200px; display:flex; align-items:center; justify-content:center;">
            <div style="width:120px; height:120px; border-radius:50%; border:15px solid #de2626; border-top-color:#eee; transform: rotate(45deg);"></div>
        </div>
        <div class="chart-legend">
            <div class="legend-item"><span class="dot" style="background:#de2626;"></span> Used</div>
            <div class="legend-item"><span class="dot" style="background:#eee;"></span> Free</div>
        </div>
    </div>
</div>
</div>
