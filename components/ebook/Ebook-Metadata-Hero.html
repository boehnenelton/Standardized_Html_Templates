<!-- Component: Ebook Metadata Hero | Type: Ebook UI | Version: 1.0.0 -->
<div class="c-ebook-hero">
    <div class="cover-art">
        <img src="{{ cover_url }}" alt="{{ title }} Cover">
    </div>
    <div class="book-details">
        <h1 class="book-title">{{ title }}</h1>
        <h2 class="book-author">by {{ author }}</h2>
        <p class="book-description">{{ description }}</p>
        <button class="btn-start">Start Reading</button>
    </div>
</div>
