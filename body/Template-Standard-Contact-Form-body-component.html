<!-- Component Name: Template Standard - Contact Form | Type: Body Component | Version: 1.0.0 -->


<div class="c-contact-form" container-type="inline-size">
    <div class="content-card"><div>Submit system reports, request access, or contact the architecture team.</div></div>
<div class="contact-container">
    <form>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" placeholder="Elton Boehnen">
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input invalid" value="invalid-email">
                <span class="error-msg">Please enter a valid email address.</span>
            </div>
            <div class="form-group full">
                <label class="form-label">Subject</label>
                <select class="form-input">
                    <option>Technical Support</option>
                    <option>Access Request</option>
                    <option>Security Report</option>
                </select>
            </div>
            <div class="form-group full">
                <label class="form-label">Message</label>
                <textarea class="form-textarea" placeholder="Detailed description of your inquiry..."></textarea>
            </div>
        </div>
        <button type="submit" class="submit-btn">Send Message</button>
    </form>
</div>
</div>
