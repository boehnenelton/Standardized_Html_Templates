{% extends "admin_base.html" %}

{% block content %}
<div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-black text-[#fe3626] uppercase tracking-tighter">Standalone Apps</h1>
    <button onclick="document.getElementById('import-modal').classList.remove('hidden')" class="bg-[#fe3626] px-6 py-2 rounded-lg font-bold shadow-lg shadow-red-900/20">+ IMPORT APP</button>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    {% for a in apps %}
    <div class="bg-[#171717] rounded-2xl border border-gray-800 group hover:border-[#fe3626]/50 transition-all shadow-xl overflow-hidden flex flex-col">
        <div class="aspect-video bg-black flex items-center justify-center relative">
            {% if a.featured_img %}
            <img src="/media/serve/{{ a.featured_img }}" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity">
            {% else %}
            <i data-lucide="cpu" class="w-12 h-12 text-gray-800"></i>
            {% endif %}
            <div class="absolute top-4 left-4 bg-black/80 px-3 py-1 rounded-full text-[9px] font-bold border border-gray-800 uppercase tracking-widest text-gray-500">
                {{ a.category_fk }}
            </div>
        </div>
        <div class="p-6 flex-grow flex flex-col">
            <h3 class="font-bold text-xl mb-3 text-gray-100 group-hover:text-[#fe3626] transition-colors">{{ a.name }}</h3>
            <p class="text-xs text-gray-500 mb-6 h-12 line-clamp-3 leading-relaxed">{{ a.description }}</p>
            <div class="flex justify-between items-center mt-auto pt-6 border-t border-gray-800">
                <span class="text-[9px] font-mono text-gray-600 uppercase">{{ a.entry_file }}</span>
                <a href="/apps/delete/{{ a.app_uuid }}" class="text-red-500 hover:text-red-400 text-[10px] font-black uppercase tracking-widest" onclick="return confirm('Delete app?')">DELETE</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<div id="import-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
    <form method="POST" enctype="multipart/form-data" class="bg-[#171717] p-8 rounded-2xl border border-gray-800 w-full max-w-md flex flex-col gap-6 shadow-2xl">
        <h2 class="text-2xl font-black text-[#fe3626] uppercase tracking-tighter">Import HTML App</h2>
        
        <div class="grid grid-cols-1 gap-4">
            <input name="name" placeholder="App Name" class="bg-black p-4 rounded-xl border border-gray-800 focus:border-[#fe3626] transition-colors" required>
            <textarea name="description" placeholder="Description" class="bg-black p-4 rounded-xl border border-gray-800 focus:border-[#fe3626] transition-colors"></textarea>
            
            <div class="grid grid-cols-2 gap-4">
                <select name="category" class="bg-black p-4 rounded-xl border border-gray-800 focus:border-[#fe3626] transition-colors">
                    {% for c in cats %}<option value="{{ c.slug }}">{{ c.name }}</option>{% endfor %}
                </select>
                <select name="featured_img" class="bg-black p-4 rounded-xl border border-gray-800 focus:border-[#fe3626] transition-colors">
                    <option value="">-- IMAGE --</option>
                    {% for a in assets %}<option value="{{ a.filename }}">{{ a.filename }}</option>{% endfor %}
                </select>
            </div>
            
            <input name="entry_file" placeholder="Entry (e.g. index.html)" class="bg-black p-4 rounded-xl border border-gray-800 focus:border-[#fe3626] transition-colors">
            
            <div class="mt-2">
                <label class="block text-[10px] font-mono text-gray-500 uppercase mb-2">Upload App (HTML or ZIP)</label>
                <input type="file" name="app_file" class="w-full bg-black p-4 rounded-xl border border-gray-800" required>
            </div>
        </div>

        <div class="flex gap-4 mt-4">
            <button type="submit" class="flex-1 bg-[#fe3626] py-4 rounded-xl font-bold uppercase tracking-widest shadow-lg shadow-red-900/20">IMPORT</button>
            <button type="button" onclick="document.getElementById('import-modal').classList.add('hidden')" class="flex-1 bg-gray-800 py-4 rounded-xl font-bold uppercase tracking-widest">CANCEL</button>
        </div>
    </form>
</div>
{% endblock %}
