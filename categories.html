{% extends "admin_base.html" %}

{% block content %}
<div class="c-bejson-table" container-type="inline-size">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h1 class="emphasis" style="margin: 0;">Logical Categories</h1>
        <button onclick="document.getElementById('add-modal').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('open');" class="c-bejson-table__btn" style="background: var(--primary); color: #fff;">+ NEW CATEGORY</button>
    </div>

    <div class="c-bejson-table__scroller">
        <table class="c-bejson-table__table">
            <thead>
                <tr>
                    <th class="c-bejson-table__th">Name <span class="c-bejson-table__type">[string]</span></th>
                    <th class="c-bejson-table__th">Slug <span class="c-bejson-table__type">[slug]</span></th>
                    <th class="c-bejson-table__th">Feed <span class="c-bejson-table__type">[enum]</span></th>
                    <th class="c-bejson-table__th">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for c in cats %}
                <tr>
                    <td class="c-bejson-table__td" style="font-weight: 700;">{{ c.name }}</td>
                    <td class="c-bejson-table__td"><code class="c-bejson-table__code">{{ c.slug }}</code></td>
                    <td class="c-bejson-table__td">
                        <span class="c-bejson-table__status c-bejson-table__status--true">{{ c.feed_type | upper }}</span>
                    </td>
                    <td class="c-bejson-table__td">
                        <button class="c-bejson-table__btn" style="color: #ef4444;">DELETE</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Add Modal (Reusing Mobile Sidebar Style for consistency) -->
<nav class="mobile-sidebar" id="add-modal" style="left: auto; right: -300px;">
    <div class="sidebar-top">
        <div class="sidebar-header">
            <span class="sidebar-title">Create Category</span>
            <span class="close-sidebar" onclick="document.getElementById('add-modal').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open');">&#x2715;</span>
        </div>
        <form method="POST" style="display: flex; flex-direction: column; gap: 16px;">
            <div>
                <label style="display:block; font-size: 0.75rem; font-weight: 700; margin-bottom: 4px;">NAME</label>
                <input name="name" style="width:100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px;" required>
            </div>
            <div>
                <label style="display:block; font-size: 0.75rem; font-weight: 700; margin-bottom: 4px;">SLUG</label>
                <input name="slug" style="width:100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px;" required>
            </div>
            <div>
                <label style="display:block; font-size: 0.75rem; font-weight: 700; margin-bottom: 4px;">FEED TYPE</label>
                <select name="feed_type" style="width:100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px;">
                    <option value="blog">Blog</option>
                    <option value="news">News</option>
                    <option value="products">Products</option>
                    <option value="masonry">Masonry</option>
                </select>
            </div>
            <button type="submit" class="c-bejson-table__btn" style="background: var(--primary); color: #fff; margin-top: 12px;">CREATE</button>
        </form>
    </div>
</nav>

<style>
    #add-modal.open { right: 0; }
</style>
{% endblock %}
